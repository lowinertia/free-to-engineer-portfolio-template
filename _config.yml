# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup
title: Samarth Sakhale | Mechanical Engineering Portfolio

# Hero Section
name: Samarth Sakhale
headline: Mechanical Engineering Student | Design & Manufacturing Enthusiast
description: >-
  I am a B.Tech Mechanical Engineering student specializing in Design and Manufacturing,
  with a strong interest in automotive engineering, CAD, and simulation-driven design.
  I have hands-on experience with SolidWorks, manufacturing processes, and team-based
  engineering projects including Baja SAE. I am passionate about turning concepts into
  functional designs through analysis, prototyping, and testing.

# Profile image
profile_image: ./assets/images/profile-image/samarth.jpg

# Resume (IMPORTANT: GitHub Pages cannot read a local D: drive file)
# If you want this to work, you MUST upload your resume to Drive or GitHub.
resume-url: https://drive.google.com/file/d/13Z3duVzh-gguPU5r03oJVEE6rV9rd3DS/preview

# External Links (USE ONLY USERNAMES, NOT FULL LINKS)
external-links:
  linkedin: samarthsakhale
  github: sakhalesamarth3-ctrl

# Skills Section
skills:
  - category: CAD & 3D Modeling
    tools:
      - SolidWorks
      - CATIA
      - Siemens NX
      - Fusion 360
      - Onshape

  - category: Simulation & Analysis
    tools:
      - ANSYS (Structural)
      - SolidWorks Simulation
      - MATLAB

  - category: Manufacturing & Prototyping
    tools:
      - CNC Machining
      - FDM & SLA 3D Printing
      - Laser Cutting
      - Water Jet Cutting
      - GD&T (ASME Y14)

  - category: Automotive & Engineering
    tools:
      - Baja SAE Braking Systems
      - DFMEA / PFMEA
      - Root Cause Analysis (5 Whys, Fishbone)

# Contact Form
formspree-key: https://formspree.io/f/xkovovqz

# Theme (keep only ONE)
colors:
  text: "#1a1c20"
  border: "#ddd"
  link: "#4a76ee"
  highlight: "#0c0cf2"
  background: "#ffffff"
  light_background: "#f3f5fb"

# Build settings (DO NOT CHANGE)
collections:
  projects:
    output: true
    permalink: /projects/:path/

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
      indent: 0

plugins:
  - jekyll-feed

include:
  - _projects


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
